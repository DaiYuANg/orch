name: smoke-docker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Docker smoke
        shell: pwsh
        run: ./scripts/local-docker-smoke.ps1

      - name: Worker dispatch smoke
        shell: pwsh
        run: ./scripts/local-docker-worker-dispatch-smoke.ps1
