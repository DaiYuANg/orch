include:
  - tasks.yml
  - tasks.example.yml
  - tasks.example2.yml
name: my-app
description: Sample workload for testing
datacenters:
  - dc1
  - dc2

units:
  - name: backend
    resources:
      cpu: 2000
      memory: 2048
    tasks:
      - name: api
        type: service
        driver: docker
        image: ghcr.io/example/api:latest
        replicas: 2
        labels:
          traefik.enable: "true"
          traefik.http.routers.api.rule: "Host(`api.warden.local`) && PathPrefix(`/`)"
          traefik.http.services.api.loadbalancer.server.port: "8080"
        env:
          PORT: "8080"
        resources:
          cpu: 1000
          memory: 1024
        network:
          name: api-net
          port:
            http: 8080
        check:
          type: http
          path: /health
          interval: 10s
          retries: 3
