version: "3"

vars:
  GORELEASER_VER: v2.12.2

tasks:
  tidy:
    desc: "Go: tidy modules"
    cmds:
      - go mod tidy

  test:
    desc: "Go: run tests"
    cmds:
      - go test ./...

  lint:
    desc: "Go: run golangci-lint"
    cmds:
      - golangci-lint run ./... --allow-serial-runners

  fmt:
    desc: "Go: format (gofmt)"
    cmds:
      - gofmt -w .

  run-cli:
    desc: "Run orch CLI (Go)"
    cmds:
      - go run ./cmd/orch-cli {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  run-server:
    desc: "Run orch server (Go)"
    cmds:
      - go run ./cmd/orch-server {{.SERVER_ARGS}}
    vars:
      SERVER_ARGS: '{{default "" .SERVER_ARGS}}'

  run-lsp:
    desc: "Run orch language server (stdio LSP)"
    cmds:
      - go run ./cmd/orch-lsp {{.LSP_ARGS}}
    vars:
      LSP_ARGS: '{{default "" .LSP_ARGS}}'

  run-vpn:
    desc: "Run orch-vpn workstation daemon (dev)"
    cmds:
      - go run ./cmd/orch-vpn {{.VPN_ARGS}}
    vars:
      VPN_ARGS: '{{default "" .VPN_ARGS}}'

  smoke:local-docker:
    desc: "Run a local single-node Docker deploy smoke test"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/local-docker-smoke.ps1 {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  smoke:local-docker-dns:
    desc: "Run a local Docker workload DNS smoke test"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/local-docker-dns-smoke.ps1 {{.CLI_ARGS}}

  smoke:local-docker-worker-dispatch:
    desc: "Run a local two-server Docker worker dispatch smoke test"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/local-docker-worker-dispatch-smoke.ps1 {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  smoke:local-podman:
    desc: "Run a local single-node Podman deploy smoke test"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/local-docker-smoke.ps1 -ContainerRuntime podman -Manifest examples/local-podman-smoke.yaml {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  smoke:local-podman-dns:
    desc: "Run a local Podman workload DNS smoke test"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/local-docker-dns-smoke.ps1 -ContainerRuntime podman -Manifest examples/local-podman-dns-smoke.yaml {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  smoke:local-podman-worker-dispatch:
    desc: "Run a local two-server Podman worker dispatch smoke test"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/local-docker-worker-dispatch-smoke.ps1 -ContainerRuntime podman -Manifest examples/local-podman-worker-dispatch.yaml {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  smoke:local-container-runtimes:
    desc: "Run available local runtime smoke checks (Docker and Podman)"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-container-runtime-smokes.ps1 {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  smoke:local-raft-forwarding:
    desc: "Run a local three-node Raft forwarding smoke test"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/local-raft-forwarding-smoke.ps1 {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  smoke:vagrant:
    desc: "Run a 3-node Vagrant smoke test (deploy -> status -> delete)"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/vagrant/smoke.ps1 {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  vagrant:up:
    desc: "Start Vagrant Orch cluster"
    cmds:
      - vagrant up

  vagrant:halt:
    desc: "Halt Vagrant Orch cluster"
    cmds:
      - vagrant halt

  vagrant:destroy:
    desc: "Destroy Vagrant Orch cluster"
    cmds:
      - vagrant destroy -f

  bench:resources:
    desc: "Measure orch-server resource usage for idle, cluster, and scheduling scenarios"
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/bench-orch-resources.ps1 {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  dsl-parse:
    desc: "Parse deploy YAML into canonical model"
    requires:
      vars: [FILE]
    cmds:
      - go run ./cmd/orch-cli parse --file {{.FILE}} {{if .JSON}}--json{{end}}

  dsl-validate:
    desc: "Validate deploy YAML (exit non-zero on error)"
    requires:
      vars: [FILE]
    cmds:
      - go run ./cmd/orch-cli validate --file {{.FILE}}

  goreleaser-check:
    desc: "Validate .goreleaser.yaml"
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@{{.GORELEASER_VER}} check

  release-snapshot:
    desc: "Archives + deb/rpm/apk snapshot under dist/ (no GitHub publish)"
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@{{.GORELEASER_VER}} release --snapshot --clean

  release-gate:static:
    desc: "Run beta release gate checks that do not require Docker"
    cmds:
      - go mod tidy
      - task lint
      - go test ./...
      - task goreleaser-check
      - task release-snapshot
      - task smoke:local-raft-forwarding

  release-gate:
    desc: "Run full beta release gate checks, including local container-runtime smoke tests"
    cmds:
      - task release-gate:static
      - task smoke:local-container-runtimes
