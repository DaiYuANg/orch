http:
  port: 7443

network:
  dns_listen: "127.0.0.1:10531"
  ingress_http_listen: "127.0.0.1:18081"

raft:
  enable: true
  node_id: "127.0.0.1:12001"
  bind_addr: "127.0.0.1:12001"
  data_dir: ".tmp/local-raft/node1"
  bootstrap: true
  join:
    - "127.0.0.1:12002"
    - "127.0.0.1:12003"
  apply_timeout: "3s"
  leader_wait_timeout: "10s"
