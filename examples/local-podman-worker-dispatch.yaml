apiVersion: warden.arcgolabs.io/v1alpha1
kind: App
metadata:
  name: dispatch-smoke
  namespace: default
workloads:
  - name: remote-worker
    kind: worker
    runtime: podman
    run:
      artifact:
        image: busybox:1.36
      exec:
        command: ["sh", "-c"]
        args: ["while true; do sleep 3600; done"]
    scheduling:
      preferredNodes:
        - worker-node
