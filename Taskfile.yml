# https://taskfile.dev

version: '3'

includes:
  dev: ./Taskfile_{{OS}}.yaml

vars:
  SERVER_BINARY_NAME: server
  PACK_BINARY_NAME: pack
  DIST_DIR: dist
  # 默认平台
  DEFAULT_GOOS: linux
  DEFAULT_GOARCH: amd64

tasks:
  build:server:
    desc: 构建当前平台（默认启用 CGO）
    cmds:
      - go build -o {{.DIST_DIR}}/{{.SERVER_BINARY_NAME}} ./cmd/server

  build:pack:
    desc: 构建当前平台（默认启用 CGO）
    cmds:
      - go build -o {{.DIST_DIR}}/{{.PACK_BINARY_NAME}} ./cmd/pack

  check:
    cmds:
      - go tool staticcheck ./...

  lint:
    cmds:
      - go tool golangci-lint run

  raft:start:
    desc: start local 3-node raft cluster (cross-platform)
    cmds:
      - go run ./cmd/localraft start -rebuild

  raft:check:
    desc: run local raft smoke checks (leader write + follower ingress)
    cmds:
      - go run ./cmd/localraft check

  raft:status:
    desc: show local raft node process status
    cmds:
      - go run ./cmd/localraft status

  raft:stop:
    desc: stop local raft cluster processes
    cmds:
      - go run ./cmd/localraft stop
