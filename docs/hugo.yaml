baseURL: https://example.org/
languageCode: en-us
title: Warden Documentation
defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1
  fr:
    languageName: Français
    weight: 2
  zh:
    languageName: 中文
    weight: 3
menu:
  main:
    - identifier: documentation
      name: Documentation
      pageRef: /docs
      weight: 1
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 2
enableGitInfo: true
params:
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
  theme:
    default: system
    displayToggle: true
module:
  imports:
    - path: github.com/imfing/hextra