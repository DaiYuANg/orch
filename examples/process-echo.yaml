apiVersion: warden.io/v1alpha1
kind: Application
metadata:
  name: process-demo
  namespace: default
spec:
  workloads:
    - name: echo
      runtime: process
      process:
        command: sh
        args:
          - -c
          - while true; do echo hello-from-process-runtime; sleep 5; done
      service:
        port: 18081
