# https://taskfile.dev

version: '3'

includes:
  dev: ./Taskfile_{{OS}}.yaml

vars:
  SERVER_BINARY_NAME: server
  CLI_BINARY_NAME: warden-cli
  PACK_BINARY_NAME: pack
  DIST_DIR: dist
  # 默认平台
  DEFAULT_GOOS: linux
  DEFAULT_GOARCH: amd64

tasks:
  build:server:
    desc: 构建当前平台（默认启用 CGO）
    cmds:
      - go build -o {{.DIST_DIR}}/{{.SERVER_BINARY_NAME}} ./cmd/server

  build:pack:
    desc: 构建当前平台（默认启用 CGO）
    cmds:
      - go build -o {{.DIST_DIR}}/{{.PACK_BINARY_NAME}} ./cmd/pack

  build:cli:
    desc: 构建当前平台 CLI（默认启用 CGO）
    cmds:
      - go build -o {{.DIST_DIR}}/{{.CLI_BINARY_NAME}} ./cmd/cli

  check:
    cmds:
      - go tool staticcheck ./...

  lint:
    cmds:
      - go tool golangci-lint run

  raft:run:
    desc: run one raft node in foreground (logs in current terminal)
    requires:
      vars: [CONF]
    cmds:
      - go run ./cmd/server run --conf {{.CONF}}

  raft:node1:
    desc: run node1 (bootstrap leader candidate)
    cmds:
      - task: raft:run
        vars:
          CONF: examples/local-raft/node1.yaml

  raft:node2:
    desc: run node2
    cmds:
      - task: raft:run
        vars:
          CONF: examples/local-raft/node2.yaml

  raft:node3:
    desc: run node3
    cmds:
      - task: raft:run
        vars:
          CONF: examples/local-raft/node3.yaml

  raft:node4:
    desc: run node4 (optional)
    cmds:
      - task: raft:run
        vars:
          CONF: examples/local-raft/node4.yaml

  raft:deploy:leader:
    desc: deploy smoke workload to leader API (default node1)
    vars:
      API: http://127.0.0.1:7443
      FILE: examples/local-raft/echo.yaml
    cmds:
      - go run ./cmd/cli --api {{.API}} service deploy --file {{.FILE}}

  raft:deploy:follower:
    desc: deploy smoke workload to follower API (should fail with not leader)
    vars:
      API: http://127.0.0.1:7444
      FILE: examples/local-raft/echo.yaml
    cmds:
      - go run ./cmd/cli --api {{.API}} service deploy --file {{.FILE}}

  raft:list:leader:
    desc: list deployments from leader API
    vars:
      API: http://127.0.0.1:7443
    cmds:
      - go run ./cmd/cli --api {{.API}} service list

  raft:list:follower:
    desc: list deployments from follower API (should contain leader-created deployment)
    vars:
      API: http://127.0.0.1:7444
    cmds:
      - go run ./cmd/cli --api {{.API}} service list

  raft:cluster:leader:
    desc: show raft cluster status from leader API
    vars:
      API: http://127.0.0.1:7443
    cmds:
      - go run ./cmd/cli --api {{.API}} cluster status

  raft:cluster:follower:
    desc: show raft cluster status from follower API
    vars:
      API: http://127.0.0.1:7444
    cmds:
      - go run ./cmd/cli --api {{.API}} cluster status
