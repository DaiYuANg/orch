apiVersion: warden.arcgolabs.io/v1alpha1
kind: App
metadata:
  name: smoke
  namespace: default
workloads:
  - name: smoke
    kind: worker
    runtime: docker
    run:
      image: busybox:1.36
      command: ["sh", "-c"]
      args: ["while true; do sleep 3600; done"]
    scheduling:
      preferredNodes:
        - smoke-node
