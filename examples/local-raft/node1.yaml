http:
  port: 7443

network:
  dns_listen: "127.0.0.1:10531"
  ingress_http_listen: "127.0.0.1:18081"

raft:
  enable: true
  node_id: 1
  bind_addr: "127.0.0.1:12001"
  worker_nodes:
    - "node-1"
    - "node-2"
    - "node-3"
    - "node-4"
  api_addr: "http://127.0.0.1:7443"
  node_api:
    - "127.0.0.1:12001=http://127.0.0.1:7443"
    - "127.0.0.1:12002=http://127.0.0.1:7444"
    - "127.0.0.1:12003=http://127.0.0.1:7445"
    - "127.0.0.1:12004=http://127.0.0.1:7446"
  data_dir: ".tmp/local-raft/node1"
  bootstrap: true
  join:
    - "127.0.0.1:12002"
    - "127.0.0.1:12003"
  apply_timeout: "3s"
  leader_wait_timeout: "10s"
