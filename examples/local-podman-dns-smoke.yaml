apiVersion: warden.arcgolabs.io/v1alpha1
kind: App
metadata:
  name: dns-smoke
  namespace: default
workloads:
  - name: dns-backend
    kind: service
    runtime: podman
    run:
      artifact:
        image: busybox:1.36
      exec:
        command: ["sh", "-c"]
        args:
          - mkdir -p /www && echo orch-dns-ok > /www/index.html && exec httpd -f -p 8080 -h /www
    scheduling:
      preferredNodes:
        - dns-smoke-node

  - name: dns-client
    kind: worker
    runtime: podman
    dependsOn:
      - dns-backend
    run:
      artifact:
        image: busybox:1.36
      exec:
        command: ["sh", "-c"]
        args:
          - until wget -qO- http://dns-backend.default.svc.orch.local:8080 | grep -q orch-dns-ok; do echo waiting-for-orch-dns; sleep 1; done; echo orch-dns-ok; while true; do sleep 3600; done
    scheduling:
      preferredNodes:
        - dns-smoke-node
