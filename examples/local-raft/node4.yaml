http:
  port: 7446

network:
  dns_listen: "127.0.0.1:10534"
  ingress_http_listen: "127.0.0.1:18084"

raft:
  enable: true
  node_id: 4
  bind_addr: "127.0.0.1:12004"
  worker_nodes:
    - "node-1"
    - "node-2"
    - "node-3"
    - "node-4"
  api_addr: "http://127.0.0.1:7446"
  node_api:
    - "127.0.0.1:12001=http://127.0.0.1:7443"
    - "127.0.0.1:12002=http://127.0.0.1:7444"
    - "127.0.0.1:12003=http://127.0.0.1:7445"
    - "127.0.0.1:12004=http://127.0.0.1:7446"
  data_dir: ".tmp/local-raft/node4"
  bootstrap: false
  apply_timeout: "3s"
  leader_wait_timeout: "10s"
